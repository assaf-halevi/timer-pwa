<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>טיימר פשוט ונחמד</title>

  <link rel="manifest" href="manifest.json" />

  <meta name="theme-color" content="#222222" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: #222;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 32px;
    }

    #timer {
      font-size: 72px;
      margin-bottom: 30px;
      font-weight: bold;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    button {
      font-size: 22px;
      padding: 15px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .close-btn {
      width: 100%;
      background: #ff4d4d;
      color: white;
      font-size: 20px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>טיימר פשוט ונחמד</h1>

    <div id="timer">05:00</div>

    <div class="buttons">
      <button id="minusBtn">-30</button>
      <button id="plusBtn">+30</button>
    </div>

    <button class="close-btn" id="closeBtn">
      סגור
    </button>
  </div>

  <script src="script.js"></script>

</body>
</html>
