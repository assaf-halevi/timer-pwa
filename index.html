<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>טיימר 5 דקות</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root {
      --bg: #111827;
      --card: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --button: #374151;
      --button-active: #4b5563;
      --accent: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937, var(--bg));
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(430px, 100%);
      background: rgba(31, 41, 55, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      text-align: center;
      position: relative;
    }

    #saveDefaultBtn {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 20px;
      width: auto;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 16px;
      margin: 0;
      max-width: 90%;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      font-weight: 700;
    }

    .status {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 24px;
      min-height: 22px;
    }

    .timer {
      font-size: clamp(64px, 18vw, 92px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 2px;
      margin: 20px 0 28px;
      direction: ltr;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 18px 14px;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      background: var(--button);
      cursor: pointer;
    }

    button:active { background: var(--button-active); transform: scale(0.99); }

    .close {
      width: 100%;
      background: rgba(239, 68, 68, 0.92);
      margin-top: 8px;
    }

    .install {
      width: 100%;
      background: var(--accent);
      color: #052e16;
      margin-top: 12px;
      display: none;
    }

    .hint {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="app">
    <div id="status" class="status">מתחיל עכשיו</div>
    <button id="saveDefaultBtn" class="install" style="display:none;">שמירה כברירת מחדל</button>
    <div id="timer" class="timer">05:00</div>

    <div class="controls">
      <button id="minusBtn">− 30 שנ׳</button>
      <button id="plusBtn">+ 30 שנ׳</button>
    </div>

    <button id="closeBtn" class="close">סגור עכשיו</button>
    <button id="installBtn" class="install">התקן כאפליקציה</button>

    <div class="hint">
      אין Pause. שינוי הזמן מפעיל את הטיימר מחדש לפי הזמן החדש.
    </div>
  </main>

  <script>
    const DEFAULT_SECONDS = 5 * 60;
    const STEP_SECONDS = 30;
    const MIN_SECONDS = 30;
    const STORAGE_KEY = 'timer-default-seconds';

    function loadDefaultSeconds() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        const value = stored !== null ? parseInt(stored, 10) : NaN;
        if (!Number.isNaN(value)) {
          return Math.max(MIN_SECONDS, value);
        }
      } catch (e) {
        // localStorage may be unavailable in some environments.
      }
      return DEFAULT_SECONDS;
    }

    let defaultSeconds = loadDefaultSeconds();
    let selectedSeconds = defaultSeconds;
    let remainingSeconds = defaultSeconds;
    let intervalId = null;
    let audioContext = null;
    let deferredInstallPrompt = null;

    const timerEl = document.getElementById('timer');
    const statusEl = document.getElementById('status');
    const saveDefaultBtn = document.getElementById('saveDefaultBtn');
    const minusBtn = document.getElementById('minusBtn');
    const plusBtn = document.getElementById('plusBtn');
    const closeBtn = document.getElementById('closeBtn');
    const installBtn = document.getElementById('installBtn');

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function updateDisplay() {
      timerEl.textContent = formatTime(remainingSeconds);
    }

    function updateSaveButtonVisibility() {
      saveDefaultBtn.style.display = selectedSeconds === defaultSeconds ? 'none' : 'block';
    }

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContext;
    }

    function playGling(type = 'start') {
      try {
        const ctx = getAudioContext();
        if (ctx.state === 'suspended') ctx.resume();

        const now = ctx.currentTime;
        const gain = ctx.createGain();
        gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.25, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);

        const notes = type === 'end'
          ? [880, 1174, 1568]
          : [784, 1046];

        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + i * 0.11);
          osc.connect(gain);
          osc.start(now + i * 0.11);
          osc.stop(now + i * 0.11 + 0.26);
        });
      } catch (e) {
        // Some browsers block sound before user interaction. The timer still works.
      }
    }

    function playEndSequence() {
      // Play end sound 3 times with short delays
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          playGling('end');
          if (navigator.vibrate) {
            navigator.vibrate([30, 50]);
          }
        }, i * 600);
      }
    }

    function vibrate(pattern) {
      if (navigator.vibrate) {
        navigator.vibrate(pattern);
      }
    }

    function startTimer(playSound = true) {
      clearInterval(intervalId);
      remainingSeconds = selectedSeconds;
      updateDisplay();
      statusEl.textContent = '';
      updateSaveButtonVisibility();

      if (playSound) {
        playGling('start');
        vibrate(100);
      }

      intervalId = setInterval(() => {
        remainingSeconds -= 1;
        updateDisplay();

        if (remainingSeconds <= 0) {
          clearInterval(intervalId);
          statusEl.textContent = 'נגמר';
          playEndSequence();

          setTimeout(() => {
            try {
              window.close();
            } catch (e) {}

            document.body.innerHTML = `
              <main class="app">
                <h1>הטיימר הסתיים</h1>
                <div class="status">אפשר לסגור את החלון.</div>
              </main>
            `;
          }, 900);
        }
      }, 1000);
    }

    plusBtn.addEventListener('click', () => {
      selectedSeconds += STEP_SECONDS;
      startTimer(false);
    });

    minusBtn.addEventListener('click', () => {
      selectedSeconds = Math.max(MIN_SECONDS, selectedSeconds - STEP_SECONDS);
      startTimer(false);
    });

    saveDefaultBtn.addEventListener('click', () => {
      defaultSeconds = selectedSeconds;
      try {
        localStorage.setItem(STORAGE_KEY, String(defaultSeconds));
      } catch (e) {
        // Ignore storage failures.
      }
      updateSaveButtonVisibility();
    });

    closeBtn.addEventListener('click', () => {
      clearInterval(intervalId);
      try {
        window.close();
      } catch (e) {}

      document.body.innerHTML = `
        <main class="app">
          <h1>נסגר</h1>
          <div class="status">אפשר לסגור את החלון.</div>
        </main>
      `;
    });

    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      installBtn.style.display = 'none';
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }

    updateDisplay();
    window.addEventListener('load', () => startTimer(true));
  </script>
</body>
</html>
